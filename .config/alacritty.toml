[colors.primary]
background = '#000000'
foreground = '#c0caf5'

[colors.normal]
black   = '#414868'
red     = '#f7768e'
green   = '#9ece6a'
yellow  = '#e0af68'
blue    = '#7aa2f7'
magenta = '#bb9af7'
cyan    = '#7dcfff'
white   = '#c0caf5'

[colors.bright]
black   = '#565f89'
red     = '#f7768e'
green   = '#9ece6a'
yellow  = '#e0af68'
blue    = '#7aa2f7'
magenta = '#bb9af7'
cyan    = '#7dcfff'
white   = '#a9b1d6'

[font]
size = 12

[font.normal]
family = "JetBrainsMono Nerd Font"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\\t"

[window]
padding = {x = 0, y = 0}
dynamic_padding = true
decorations = "None"
startup_mode = "Maximized"
opacity = 1
blur = true

[cursor]
style = {shape = "Block", blinking = "Off"}
unfocused_hollow = true

[mouse]
hide_when_typing = true

