[colors.primary]
background = '#1d2021'
foreground = '#d4be98'

[colors.normal]
black   = '#32302f'
red     = '#ea6962'
green   = '#a9b665'
yellow  = '#d8a657'
blue    = '#7daea3'
magenta = '#d3869b'
cyan    = '#89b482'
white   = '#d4be98'

[colors.bright]
black   = '#32302f'
red     = '#ea6962'
green   = '#a9b665'
yellow  = '#d8a657'
blue    = '#7daea3'
magenta = '#d3869b'
cyan    = '#89b482'
white   = '#d4be98'

[font]
size = 8.0

[font.normal]
family = "JetBrainsMono Nerd Font"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard= true
semantic_escape_chars= ",│`|:\"' ()[]{}<>\t"

[window]
padding = {x = 0, y = 0}
dynamic_padding = true
decorations = "None"
startup_mode = "Maximized"
opacity = 1
blur = true

[cursor]
style = {shape = "Block", blinking = "Off"}
unfocused_hollow = true

[mouse]
hide_when_typing = true
