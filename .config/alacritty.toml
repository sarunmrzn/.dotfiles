[colors.primary]
background = '#1a1b26'  # Deep navy blue background
foreground = '#c0caf5'  # Soft blue for foreground

[colors.normal]
black   = '#1a1b26'  # Deep navy blue for black
red     = '#f7768e'  # Vibrant red-pink for red
green   = '#9ece6a'  # Muted green for green
yellow  = '#e0af68'  # Warm yellow for yellow
blue    = '#7aa2f7'  # Calm blue for blue
magenta = '#bb9af7'  # Soft purple for magenta
cyan    = '#7dcfff'  # Light cyan for cyan
white   = '#a9b1d6'  # Light muted blue for white

[colors.bright]
black   = '#414868'  # Muted blue-gray for bright black
red     = '#f7768e'  # Vibrant red-pink for bright red
green   = '#9ece6a'  # Muted green for bright green
yellow  = '#e0af68'  # Warm yellow for bright yellow
blue    = '#7aa2f7'  # Calm blue for bright blue
magenta = '#bb9af7'  # Soft purple for bright magenta
cyan    = '#7dcfff'  # Light cyan for bright cyan
white   = '#c0caf5'  # Soft blue for bright white

[font]
size = 10

[font.normal]
family = "JetBrainsMono Nerd Font"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\\t"

[window]
padding = {x = 0, y = 0}
dynamic_padding = true
decorations = "None"
startup_mode = "Maximized"
opacity = 1
blur = true

[cursor]
style = {shape = "Block", blinking = "Off"}
unfocused_hollow = true

[mouse]
hide_when_typing = true

