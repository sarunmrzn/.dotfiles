separator=true
separator_block_width=15

[mediaplayer]
command=./scripts/mediaplayer
instance=spotify
interval=1
signal=10
color=#c0caf5  ; Tokyo Night primary text color

[battery]
command=./scripts/battery
interval=30
LABEL=⚡
color=#c0caf5  ; Tokyo Night primary text color

[cpu_usage]
command=./scripts/cpu_usage
interval=2
color=#a9b1d6  ; Tokyo Night secondary text color

[memory]
command=./scripts/memory
interval=30
color=#c0caf5  ; Tokyo Night primary text color

[calendar]
command=./scripts/calendar
interval=60
DATEFMT=+%a %b %d, %Y %I:%M %p
color=#c0caf5  ; Tokyo Night primary text color

[dunst]
command=./scripts/dunst
markup=pango
interval=once
format=json
color=#c0caf5  ; Tokyo Night primary text color

