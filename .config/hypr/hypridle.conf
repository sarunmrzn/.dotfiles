general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Screen dimming
listener {
    timeout = 300                               # 5min
    on-timeout = brightnessctl -s set 30        # Dim to 30%
    on-resume = brightnessctl -r                # Restore brightness
    inhibit_when = {
        audio = true
        fullscreen = true
    }
}

# Keyboard backlight
listener {
    timeout = 120                               # 2min
    on-timeout = brightnessctl -sd rgb:kbd_backlight set 0
    on-resume = brightnessctl -rd rgb:kbd_backlight
    inhibit_when = {
        audio = true
        fullscreen = true
    }
}

# Screen lock
listener {
    timeout = 300                               # 5min
    on-timeout = loginctl lock-session
    inhibit_when = {
        audio = true
        fullscreen = true
    }
}

# DPMS
listener {
    timeout = 330                               # 5.5min
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
    inhibit_when = {
        audio = true
        fullscreen = true
    }
}

# System suspend
listener {
    timeout = 900                               # 15min
    on-timeout = systemctl suspend
    inhibit_when = {
        audio = true
        fullscreen = true
    }
}
