#‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖĎ‚Ėą   ‚Ėą‚ĖĎ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ
#‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚ĖÄ‚ĖĄ‚ĖÄ   ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚ĖĄ‚Ėą
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą
#‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ
monitor=,preferred,auto,auto

#‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ
#‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖĎ‚Ėą ‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚Ėą‚ĖĄ ‚ĖĄ‚Ėą
workspace = 1, persistent:true
workspace = 2, persistent:true, default:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true

#‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ
#‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ
$mainMod = SUPER
$terminal = alacritty
$browser = zen-browser
$fileManager = thunar
$menu = rofi -show drun

#‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ ‚ĖÄ‚Ėą‚ĖÄ ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ
#‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ‚Ėą ‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚ĖĎ‚Ėą‚ĖĎ
exec-once = $terminal & waybar & swaync & hypridle & copyq & swaync & hypridle & nm-applet & blueman-applet
exec-once = systemctl --user start hyprpolkitagent
exec-once = ~/.config/hypr/scripts/wallpaper-switcher.sh


#‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ
#‚Ėą‚ĖĄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ
general {
    gaps_in = 3
    gaps_out = 3
    border_size = 2
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(45475aee)
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true
    allow_tearing = false
    layout = dwindle
}

#‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą
#‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą
decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = true
        range = 10
        render_power = 5
        color = rgba(11111bee)
    }

    blur {
        enabled = true
        size = 7
        passes = 2
    }
}

#‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ
#‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚ĖĄ‚Ėą
animations {
    enabled = yes
    
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = slow, 0, 0.85, 0.3, 1
    
    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, linear
    animation = borderangle, 1, 30, linear, loop
    animation = fade, 1, 5, slow
    animation = workspaces, 1, 5, wind
}

#‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ
#‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
    repeat_rate = 50
    repeat_delay = 200
    kb_options = caps:escape
    accel_profile = adaptive
}

#‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ
#‚Ėą‚ĖĄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚Ėą‚ĖĄ ‚ĖĄ‚Ėą
gestures {
    workspace_swipe = true
}

#‚Ėą‚ĖĎ‚ĖĎ ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ
#‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ
dwindle {
    pseudotile = true
    preserve_split = true
}

#‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ
#‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą ‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    enable_swallow = true
    swallow_regex = ^(Alacritty)$
}

#‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ
#‚Ėą‚ĖĎ‚Ėą ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ
xwayland {
    force_zero_scaling = true
}

#‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ
#‚Ėą‚ĖĎ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ‚Ėą ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚ĖĄ‚Ėą

# Application launchers
bind = $mainMod, T, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, $menu
bind = $mainMod, N, exec, swaync-client -t -sw

# Screenshot and utilities
bind = , PRINT, exec, hyprshot -m window
bind = SHIFT, PRINT, exec, hyprshot -m region
bind = $mainMod, C, exec, hyprpicker -a

# System controls
bind = $mainMod, X, exec, hyprlock
bind = $mainMod, END, exec, hyprshade on blue-light-filter
bind = $mainMod, HOME, exec, hyprshade off
bind = $mainMod, Y, exec, ~/.config/hypr/scripts/reload.sh

# Window management
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, F, fullscreen
bind = $mainMod, W, togglesplit,
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,

# Focus movement
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Window movement
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r

# Workspace management
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move windows to workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media controls
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Window grouping (tabbing)
bind = $mainMod, G, togglegroup
bind = $mainMod, tab, changegroupactive, f
bind = $mainMod SHIFT, tab, changegroupactive, b

# Resize submap
bind = $mainMod, R, submap, resize
submap = resize
    binde = , h, resizeactive, -10 0
    binde = , l, resizeactive, 10 0
    binde = , k, resizeactive, 0 -10
    binde = , j, resizeactive, 0 10
    bind = , escape, submap, reset
submap = reset

#‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą   ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ
#‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ   ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚Ėą‚ĖĄ ‚ĖĄ‚Ėą

# General rules
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

# Workspace assignments
windowrulev2 = workspace special:magic,class:^(obsidian)$
windowrulev2 = workspace 2,class:^(zen)$
windowrulev2 = workspace 3,class:^(Postman|DBeaver)$
windowrulev2 = workspace 4,class:^(discord|Slack|teams)$
windowrulev2 = workspace 5,class:^(Spotify)$

# Floating windows
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(copyq)$
windowrulev2 = float, class:^(nm-connection-editor)$

# Center windows
windowrulev2 = center, class:^(wofi|zen-browser|thunar|copyq)$

# Picture-in-Picture rules
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = size 25% 25%, title:^(Picture-in-Picture)$
windowrulev2 = move 72% 72%, title:^(Picture-in-Picture)$

# Group configuration
group {
    col.border_active = rgb(cba6f7)
    col.border_inactive = rgb(313244)
    col.border_locked_active = rgb(f38ba8)
    col.border_locked_inactive = rgb(313244)

    groupbar {
        enabled = true
        font_family = JetBrainsMono Nerd Font
        font_size = 10
        height = 10
        gradients = true
        render_titles = true
        scrolling = true
        text_color = rgb(4c4f69)
        col.active = rgb(a6d189)
        col.inactive = rgb(939ab7)
        col.locked_active = rgb(a6d189)
        col.locked_inactive = rgb(939ab7)
    }
}

# Idle inhibit rules
windowrulev2 = idleinhibit fullscreen, class:.* # Any fullscreen window
windowrulev2 = idleinhibit focus, class:^(firefox|chromium)$, title:^(.*YouTube.*|.*Twitch.*)$ # Browsers with video
windowrulev2 = idleinhibit focus, class:^(discord|zoom|teams|slack)$ # Communication apps
windowrulev2 = idleinhibit focus, class:^(mpv|.+exe)$ # Games and video players
