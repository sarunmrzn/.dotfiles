################
### MONITORS ###
################
monitor=,preferred,auto,auto

####################
### MY PROGRAMS ###
####################
$terminal = alacritty
$browser= zen-browser
$fileManager = thunar
$menu = wofi --show drun

#################
### AUTOSTART ###
#################
# If you want dynamic wallpapers (e.g., switching between Dawn/Moon variants), consider
# writing a script (~/scripts/dynamic-wallpaper.sh) and adding it to your autostart.
exec-once = hyprpaper & waybar & $terminal & nm-applet & blueman-applet & swaync & hypridle &
exec-once = systemctl --user start hyprpolkitagent
# Example: exec-once = ~/scripts/dynamic-wallpaper.sh &

### ENVIRONMENT VARIABLES ###
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 0
    gaps_out = 1
    border_size = 1
    col.active_border = rgba(eb6f92ee) rgba(c4a7e7ee) 45deg
    col.inactive_border = rgba(6e6a86aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 5
    active_opacity = 1
    inactive_opacity = 1
    shadow {
        enabled = true
        range = 10
        render_power = 5
        color = rgba(1f1d2eee)
    }
    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.2
    }
}

animations {
    enabled = yes
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    animation = global, 1, 10, default
    animation = border, 1, 5, easeOutQuint
    animation = windows, 1, 5, easeOutQuint
    animation = fadeIn, 1, 2, easeOutQuint
    animation = fadeOut, 1, 1.5, easeOutQuint
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    follow_mouse = 2
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
    repeat_rate = 50
    repeat_delay = 200
}

gestures {
    workspace_swipe = false
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, T, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, $menu

bind = , PRINT, exec, hyprshot -m window
bind = SHIFT, PRINT, exec, hyprshot -m region
bind = $mainMod, C, exec, hyprpicker -a

bind = $mainMod, X, exec, hyprlock
bind = $mainMod, END, exec, hyprshade on blue-light-filter
bind = $mainMod, HOME, exec, hyprshade off
bind = $mainMod, X, exec, hyprlock
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, F, fullscreen
bind = $mainMod, W, togglesplit,

bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,

bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r


bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule = opacity 0.95 0.85, title:(.*)(Alacritty)$

windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = center, class:^(wofi|zen-browser|thunar)$

windowrulev2 = workspace 1,class:^(obsidian)$
windowrulev2 = workspace 2,class:^(zen)$
windowrulev2 = workspace 3,class:^(Postman|DBeaver)$
windowrulev2 = workspace 4,class:^(discord|Slack)$
windowrulev2 = workspace 5,class:^(spotify)$
