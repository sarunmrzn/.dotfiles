$font = JetBrainsMono Nerd Font
$text = rgb(cdd6f4)  # Catppuccin Mocha Text

general {
  disable_loading_bar = true
  hide_cursor = true
  grace = 2  # Allow grace period to unlock without password (seconds)
  no_fade_in = false  # Fade in when locking
}

background {
    monitor =
    path = ~/Pictures/Wallpapers/279.jpg
    color = rgb(1e1e2e)  # Catppuccin Mocha Base
    blur_passes = 3  # Add some blur to the background
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
}

label {
  monitor =
  text = $TIME
  color = $text
  font_size = 90
  font_family = $font
  position = -30, 0
  halign = right
  valign = top
  shadow_passes = 1  # Add subtle shadow to text
  shadow_size = 2
  shadow_color = 0x11111bcc  # Catppuccin Mocha Crust
}

label {
  monitor =
  text = cmd[update:43200000] date +"%A, %d %B %Y"
  color = $text
  font_size = 25
  font_family = $font
  position = -30, -150
  halign = right
  valign = top
  shadow_passes = 1
  shadow_size = 2
  shadow_color = 0x11111bcc  # Catppuccin Mocha Crust
}

input-field {
    monitor =
    size = 200, 50  # A bit larger input field
    outline_thickness = 3
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(cba6f7ee) rgba(89b4faee) 45deg  # Mauve to Blue gradient
    inner_color = rgba(313244, 0.5)  # Surface0 with transparency
    font_color = rgb(cdd6f4)  # Text
    fade_on_empty = true
    placeholder_text = <i>Password...</i>  # Italicized placeholder text
    hide_input = false
    rounding = 15
    check_color = rgba(a6e3a1ee) rgba(89b4faee) 120deg  # Green to Blue gradient
    fail_color = rgba(f38ba8ee) rgba(89b4faee) 40deg    # Red to Blue gradient
    position = 0, -20
    halign = center
    valign = center
}

