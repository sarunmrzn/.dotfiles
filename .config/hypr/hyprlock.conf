$font = JetBrainsMono Nerd Font
$text = rgb(cdd6f4)

general {
  disable_loading_bar = true
  hide_cursor = true
  grace = 2
  no_fade_in = false
}

background {
    monitor =
    path = ~/Pictures/Wallpapers/20250117_195028.png
    color = rgb(1e1e2e)
    # blur_passes = 3
    # blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
}

label {
  monitor =
  text = $TIME
  color = $text
  font_size = 90
  font_family = $font
  position = -30, 0
  halign = right
  valign = top
  shadow_passes = 1
  shadow_size = 2
  shadow_color = 0x11111bcc
}

label {
  monitor =
  text = cmd[update:43200000] date +"%A, %d %B %Y"
  color = $text
  font_size = 25
  font_family = $font
  position = -30, -150
  halign = right
  valign = top
  shadow_passes = 1
  shadow_size = 2
  shadow_color = 0x11111bcc
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(cba6f7ee) rgba(89b4faee) 45deg
    inner_color = rgba(313244, 0.5)
    font_color = rgb(cdd6f4)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 15
    check_color = rgba(a6e3a1ee) rgba(89b4faee) 120deg
    fail_color = rgba(f38ba8ee) rgba(89b4faee) 40deg
    position = 0, -20
    halign = center
    valign = center
}

