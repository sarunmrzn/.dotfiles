$font = JetBrainsMono Nerd Font
$text = rgb(cdd6f4)

general {
  disable_loading_bar = true
  hide_cursor = true
  grace = 2
  no_fade_in = false
}

background {
    monitor =
    path = ~/Pictures/Wallpapers/20250117_195028.png
    color = rgb(1e1e2e)
    blur_passes = 2
    blur_size = 4
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
}

label {
  monitor =
  text = $TIME
  color = rgb(cdd6f4)
  font_size = 96
  font_family = $font
  position = 0, -120
  halign = center
  valign = center
  shadow_passes = 2
  shadow_size = 4
  shadow_color = 0x11111bcc
}

label {
  monitor =
  text = cmd[update:43200000] date +"%A, %d %B %Y"
  color = rgb(a6adc8)
  font_size = 28
  font_family = $font
  position = 0, -40
  halign = center
  valign = center
  shadow_passes = 2
  shadow_size = 3
  shadow_color = 0x11111bcc
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(cba6f7ff) rgba(89b4faff) 45deg
    inner_color = rgba(313244ee)
    font_color = rgb(cdd6f4)
    fade_on_empty = true
    placeholder_text = <i>Enter Password...</i>
    hide_input = true
    rounding = 20
    check_color = rgba(a6e3a1ff) rgba(94e2d5ff) 120deg
    fail_color = rgba(f38ba8ff) rgba(eba0acff) 40deg
    position = 0, 40
    halign = center
    valign = center
}

