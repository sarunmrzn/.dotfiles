background {
    monitor =
    path = ~/Pictures/Wallpapers/wallhaven-exkg7w.jpg
    # Rosé Pine Base (#191724): converted to rgba(25, 23, 36, 1.0)
    color = rgba(25, 23, 36, 1.0)
    blur_passes = 2
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0)  # no fill

    # Outer border: Rosé Pine Love (#eb6f92) and Iris (#c4a7e7) at a 45° gradient
    outer_color = rgba(eb6f92ee) rgba(c4a7e7ee) 45deg

    # Check color: blending Rosé Pine Gold (#f6c177) and Love (#eb6f92) at a 120° gradient
    check_color = rgba(f6c177ee) rgba(eb6f92ee) 120deg

    # Fail color: blending Rosé Pine Rose (#ebbcba) and Love (#eb6f92) at a 40° gradient
    fail_color = rgba(ebbcbaee) rgba(eb6f92ee) 40deg

    # Font color using Rosé Pine Text (#e0def4) converted to rgb(224, 222, 244)
    font_color = rgb(224, 222, 244)
    fade_on_empty = false
    rounding = 15

    position = 0, -20
    halign = center
    valign = center
}

