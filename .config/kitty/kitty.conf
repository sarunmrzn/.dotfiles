# Kitty terminal configuration

# Theme
background #1a1b26
foreground #c0caf5
selection_background #283457
selection_foreground #c0caf5
url_color #73daca
cursor #c0caf5
cursor_shape beam
cursor_beam_thickness 1.5

# Background opacity
background_opacity 0.70

# Cursor blink
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# Window
window_padding_width 4
window_border_width 1
window_border_radius 4
window_margin_width 0
hide_window_decorations yes
placement_strategy center
remember_window_size yes
initial_window_width 1000
initial_window_height 600

# Font
font_family MesloLGLDZ Nerd Font Mono
font_size 10
adjust_line_height 110%
adjust_column_width 100%

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
active_tab_foreground #1a1b26
active_tab_background #7aa2f7
active_tab_font_style bold
inactive_tab_foreground #c0caf5
inactive_tab_background #1a1b26
inactive_tab_font_style normal

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Scrollback
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# Shell integration
shell_integration enabled
allow_remote_control yes
listen_on unix:/tmp/kitty
enabled_layouts tall,stack

# Keyboard shortcuts
# Vim-like navigation
map ctrl+shift+h send_text all \x1b\x62
map ctrl+shift+l send_text all \x1b\x66
map ctrl+shift+j send_text all \x1b\x6e
map ctrl+shift+k send_text all \x1b\x70
map ctrl+shift+0 send_text all \x1b\x68
map ctrl+shift+4 send_text all \x1b\x6c
map ctrl+shift+6 send_text all \x1b\x5e
map ctrl+shift+7 send_text all \x1b\x5f
map ctrl+shift+8 send_text all \x1b\x2a
map ctrl+shift+9 send_text all \x1b\x28

# General shortcuts
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0
map ctrl+shift+enter new_window
map ctrl+shift+n new_os_window
map ctrl+shift+w close_window
map ctrl+shift+] next_tab
map ctrl+shift+[ previous_tab
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+l next_layout
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5

# Mouse shortcuts
mouse_map ctrl+shift+left release grabbed,ungrab
mouse_map ctrl+shift+middle release grabbed,ungrab
mouse_map ctrl+shift+right release grabbed,ungrab

# Color scheme
# Tokyo Night theme
color0 #1a1b26
color1 #f7768e
color2 #9ece6a
color3 #e0af68
color4 #7aa2f7
color5 #bb9af7
color6 #7dcfff
color7 #a9b1d6
color8 #414868
color9 #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# URL handling
url_style curly
open_url_with default
copy_on_select yes
strip_trailing_spaces smart

# Bell
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab "🔔 "

# Vim-specific optimizations
# Disable cursor blink in insert mode
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
# Optimize for Vim's visual mode
mouse_hide_wait 0
focus_follows_mouse yes
# Better handling of Vim's visual mode selection
copy_on_select yes
# Ensure proper handling of Vim's escape sequences
term xterm-256color 
