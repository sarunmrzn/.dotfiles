backend = "glx";

vsync = true;

# Make background of inactive windows dim slightly
inactive-opacity = 0.99;
active-opacity = 0.9;

# opacity-rule = [
#     "90:class_g = 'Alacritty'",
#     "90:class_g = 'polybar'",
#     "90:class_g = 'Postman'",
#     "90:class_g = 'DBeaver'",
#     "90:class_g = 'Google-chrome'",
#     "90:class_g = 'discord'",
#     "90:class_g = 'obsidian'",
#     "90:class_g = 'dmenu'",
# ];


# Rounded corners (set to 0 to disable)
# corner-radius = 10;

# Shadow settings
shadow = false;
shadow-radius = 12;
shadow-opacity = 0.4;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-exclude = [
    "class_g = 'dmenu'",
    "name = 'Notification'",
    "_GTK_FRAME_EXTENTS@:c"
];

# Blur settings (for background of transparent windows)
blur:
{
    method = "gaussian";
    size = 5;
    deviation = 5;
};


# Detect rounded corners and transparent borders
detect-rounded-corners = true;
detect-client-opacity = true;

# Force window transparency even if unsupported
force_win_blend = true;

# Disable fading completely
fading = false;
fade-in-step = 0.0;
fade-out-step = 0.0;
fade-delta = 0;

# Ensure no animations related to fading
no-fading-openclose = true;
no-fading-destroyed-argb = true;
