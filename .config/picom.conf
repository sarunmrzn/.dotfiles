# Enable backend for better performance (choose between "glx" and "xrender")
backend = "glx";

# Enable vsync to reduce screen tearing
vsync = true;

# Set window opacity (adjust values as needed)
opacity-rule = [
    "80:class_g = 'Alacritty'",
    "80:class_g = 'i3bar'",
    "80:class_g = 'i3-tray'",
    "80:class_g = 'dmenu'",
];


# Rounded corners (set to 0 to disable)
# corner-radius = 10;

# Shadow settings
shadow = false;
shadow-radius = 12;
shadow-opacity = 0.4;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-exclude = [
    "class_g = 'i3bar'",
    "class_g = 'dmenu'",
    "class_g = 'rofi'",
    "name = 'Notification'",
    "_GTK_FRAME_EXTENTS@:c"
];

# Blur settings (for background of transparent windows)
blur:
{
    method = "gaussian";
    size = 10;
    deviation = 10;
};

# Exclude certain windows from being blurred
blur-background-exclude = [
    "class_g = 'i3bar'",
    "class_g = 'dmenu'",
];

# Make background of inactive windows dim slightly
inactive-opacity = 0.9;
active-opacity = 1.0;

# Detect rounded corners and transparent borders
detect-rounded-corners = true;
detect-client-opacity = true;

# Force window transparency even if unsupported
force_win_blend = true;


# Disable fading completely
fading = false;
fade-in-step = 0.0;
fade-out-step = 0.0;
fade-delta = 0;

# Ensure no animations related to fading
no-fading-openclose = true;
no-fading-destroyed-argb = true;
